name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint if configured
        run: npm run lint --if-present

      - name: Run tests
        run: npm test

      - name: Build Docker test image
        run: docker build --target test -t blockchain-hometask:test .

      - name: Run Docker test image
        run: docker run --rm blockchain-hometask:test

      - name: Build runtime image
        run: docker build -t blockchain-hometask:ci .
